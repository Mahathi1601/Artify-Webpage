<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Welcome to Mahathi's Art Store</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family:Arial , sans-serif;
      background: linear-gradient(to right, #f9f9f9, #d4f1f4);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
}

h1 {
      font-size: 2.5rem;
      color: #1abc9c;
}

p {
      font-size: 1.2rem;
      color: #555;
 }

button {
      margin-top: 20px;
      padding: 12px 24px;
      font-size: 1rem;
      background-color: #1abc9c;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
}

button:hover {
      background-color: #16a085;
}
  </style>
</head>
<body>
  <h1>Welcome to Mahathi's Art World 🎨</h1>
  <p>Click the button below to enter the store and explore beautiful mandalas and sketches!</p>
  <button id="enterBtn">Enter Store</button>
  <script>
    const session = JSON.parse(localStorage.getItem('storedData'));
    document.getElementById('enterBtn').onclick = () => {
      if(session&& session.username){
        window.location.href='store.html';
      }else{
        window.location.href='signup.html';
      }
    };
  </script>
</body>
</html>
