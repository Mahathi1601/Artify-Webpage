<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Profile</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f8;
}

.container {
    max-width: 550px;
    margin: 60px auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.1);
}

h2 {
    margin-bottom: 20px;
}

.input-group {
    margin-bottom: 15px;
}

.input-group label {
    font-weight: 600;
    display: block;
    margin-bottom: 5px;
}

.input-group input {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    outline: none;
    transition: 0.2s;
}

.input-group input:focus {
    border-color: #1abc9c;
}

.btn {
    width: 100%;
    padding: 12px;
    background: #1abc9c;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
}

.btn:hover {
    background: #16a085;
}
</style>
</head>

<body>

<div class="container">
    <h2>Edit Profile</h2>

    <div class="input-group">
       <label>Profile Picture</label>
       <input type="file" id="profilePic">
    </div>
    <div class="input-group">
        <label>Username</label>
        <input type="text" id="username">
    </div>

    <div class="input-group">
        <label>Name</label>
        <input type="text" id="name">
    </div>
    
    <div class="input-group">
        <label>Email</label>
        <input type="email" id="email">
    </div>

    <div class="input-group">
        <label>Phone</label>
        <input type="text" id="phone" placeholder="+91XXXXXXXXXX">
    </div>

    <div class="input-group">
        <label>Address</label>
        <input type="text" id="address">
    </div>

    <div class="input-group">
        <label>New Password</label>
        <input type="password" id="password">
    </div>

    <button class="btn" onclick="updateProfile()">Save Changes</button>
</div>

<script>
let user = JSON.parse(localStorage.getItem("user"));

if (!user) {
    window.location.href = "login.html";
}

// ✅ Prefill
document.getElementById("username").value = user.username || "";
document.getElementById("name").value = user.name || "";
document.getElementById("email").value = user.email || "";
document.getElementById("phone").value = user.phone || "";
document.getElementById("address").value = user.address || "";

let profilePicBase64 = "";

document.getElementById("profilePic").addEventListener("change", function(e){
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onloadend = function () {
        profilePicBase64 = reader.result;
    };

    if (file) reader.readAsDataURL(file);
});

async function updateProfile() {
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const username = document.getElementById("username").value;
    const phone = document.getElementById("phone").value;
    const address = document.getElementById("address").value;
    const password = document.getElementById("password").value;

    let user = JSON.parse(localStorage.getItem("user"));

    if (!user || !user._id) {
        alert("User not found. Please login again.");
        return;
    }

    try {
        const res = await fetch(`http://localhost:5000/api/auth/update/${user._id}`, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                name,
                email,
                username,
                phone,
                address,
                profilePic: profilePicBase64 || user.profilePic,
                password: password || undefined
            })
        });

        const updatedUser = await res.json();

        // ✅ update localStorage also
        localStorage.setItem("user", JSON.stringify(updatedUser));

        alert("Profile Updated in Database ✅");

        window.location.href = "profile.html";

    } catch (err) {
        console.log(err);
        alert("Error updating profile ❌");
    }
}
</script>

</body>
</html>
